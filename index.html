<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Telegram Manifest — Sovereign Renderer</title>
  <!-- Telegram Web App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }
    canvas {
      display: block;
      width: auto;
      height: 100vh;
      aspect-ratio: 9/16;
    }
    #ui-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      padding-bottom: 40px;
      box-sizing: border-box;
      z-index: 10;
    }
    .series-btn {
      pointer-events: auto;
      background: rgba(0, 255, 102, 0.15);
      border: 1px solid #00ff66;
      color: #00ff66;
      padding: 12px 24px;
      margin: 6px;
      font-family: inherit;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      border-radius: 4px;
      backdrop-filter: blur(5px);
      transition: all 0.2s;
      text-transform: uppercase;
    }
    .series-btn:active {
      background: #00ff66;
      color: #000;
    }
    #status {
      color: #00ff66;
      font-size: 14px;
      margin-top: 10px;
      pointer-events: auto;
      text-shadow: 0 0 8px #00ff66;
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui-overlay">
  <div>
    <button class="series-btn" data-series="1">Серия 1</button>
    <button class="series-btn" data-series="2">Серия 2</button>
    <button class="series-btn" data-series="3">Серия 3</button>
    <button class="series-btn" data-series="4">Серия 4</button>
    <button class="series-btn" data-series="5">Серия 5</button>
    <button class="series-btn" data-series="6">Серия 6</button>
    <button class="series-btn" data-series="7">Серия 7</button>
    <button class="series-btn" data-series="8">Серия 8</button>
    <button class="series-btn" data-series="9">Серия 9</button>
  </div>
  <div id="status">Ожидание выбора серии</div>
</div>

<script>
// ======================== ИНИЦИАЛИЗАЦИЯ TELEGRAM ========================
window.userTelegramNick = (() => {
  try {
    const user = window.Telegram?.WebApp?.initDataUnsafe?.user;
    if (user?.username) return '@' + user.username;
  } catch(e) {}
  return '@ANONYMOUS';
})();

// Уведомляем Telegram, что приложение готово
if (window.Telegram?.WebApp?.ready) {
  window.Telegram.WebApp.ready();
}

// ======================== ЯДРО ПЛЕЕРА ========================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = 1080;
canvas.height = 1920;

let animationFrameId;
let startTime = 0;
let isPlaying = false;
let mediaRecorder;
let recordedChunks = [];
let audioCtx;
let camera = { x: 0, y: 0, zoom: 1, shake: 0 };
let particles = [];
let glitchIntensity = 0;
let flashAlpha = 0;
let flashColor = '#ffffff';

let currentSeries = null;
let currentStepIndex = 0;
let totalDuration = 15;
let steps = [];

// Глобальный Gain для экспорта аудио
let masterGain;

// ======================== ЧАСТИЦЫ (ParticleEngine) ========================
class Particle {
  constructor(x, y, vx, vy, life, color = '#00ff66') {
    this.x = x;
    this.y = y;
    this.vx = vx;
    this.vy = vy;
    this.life = life;
    this.maxLife = life;
    this.color = color;
  }
  update(dt) {
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.life -= dt;
  }
  draw(ctx) {
    if (this.life <= 0) return;
    const alpha = this.life / this.maxLife;
    ctx.fillStyle = this.color;
    ctx.globalAlpha = alpha;
    ctx.fillRect(this.x, this.y, 2, 2);
    ctx.globalAlpha = 1;
  }
}

function spawnParticles(x, y, count, color) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 20 + Math.random() * 80;
    particles.push(new Particle(
      x, y,
      Math.cos(angle) * speed,
      Math.sin(angle) * speed,
      0.5 + Math.random() * 1.5,
      color
    ));
  }
}

// ======================== ЗВУК (Web Audio API) ========================
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.connect(audioCtx.destination);
  }
}

function playBassDrop() {
  if (!audioCtx || !masterGain) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(150, now);
  osc.frequency.exponentialRampToValueAtTime(40, now + 0.8);
  gain.gain.setValueAtTime(1, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start(now);
  osc.stop(now + 0.8);
}

function playGlitchSound() {
  if (!audioCtx || !masterGain) return;
  const now = audioCtx.currentTime;
  const bufferSize = audioCtx.sampleRate * 0.05;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * 0.3;
  }
  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.5, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
  source.connect(gain);
  gain.connect(masterGain);
  source.start(now);
}

// ======================== ТРИГГЕРЫ ========================
function triggerImpact() {
  camera.shake = 15;
  camera.zoom = 1.08;
  playBassDrop();
}

function triggerGlitch() {
  glitchIntensity = 1.0;
  playGlitchSound();
}

function triggerFlash(color = '#ffffff') {
  flashAlpha = 1.0;
  flashColor = color;
}

// ======================== РЕНДЕРИНГ ТЕКСТА С RGB SPLIT ========================
function drawGlitchText(text, x, y, shift = 5) {
  ctx.save();
  ctx.globalCompositeOperation = "screen";
  ctx.fillStyle = "rgba(255, 0, 0, 1)";
  ctx.fillText(text, x - shift, y);
  ctx.fillStyle = "rgba(0, 255, 102, 1)";
  ctx.fillText(text, x, y);
  ctx.fillStyle = "rgba(0, 0, 255, 1)";
  ctx.fillText(text, x + shift, y);
  ctx.restore();
}

// ======================== ЭКСПОРТ ВИДЕО ========================
function getSupportedMimeType() {
  const types = [
    'video/webm;codecs=vp9,opus',
    'video/webm;codecs=vp8,opus',
    'video/webm',
    'video/mp4'
  ];
  for (let type of types) {
    if (MediaRecorder.isTypeSupported(type)) return type;
  }
  return '';
}

async function startRecording() {
  initAudio();
  const videoStream = canvas.captureStream(60);
  const audioDest = audioCtx.createMediaStreamDestination();
  masterGain.connect(audioDest);
  
  const combinedStream = new MediaStream([
    videoStream.getVideoTracks()[0],
    audioDest.stream.getAudioTracks()[0]
  ]);
  
  const mimeType = getSupportedMimeType();
  if (!mimeType) {
    alert('Ваш браузер не поддерживает запись видео.');
    return;
  }
  
  mediaRecorder = new MediaRecorder(combinedStream, {
    mimeType: mimeType,
    videoBitsPerSecond: 8500000
  });
  
  recordedChunks = [];
  mediaRecorder.ondataavailable = (e) => {
    if (e.data.size > 0) recordedChunks.push(e.data);
  };
  
  mediaRecorder.onstop = () => {
    const blob = new Blob(recordedChunks, { type: 'video/webm' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `manifest_series_${currentSeries?.id || 'custom'}.webm`;
    a.click();
    setStatus('Видео сохранено');
    // Отключаем audioDest
    masterGain.disconnect(audioDest);
  };
  
  mediaRecorder.start();
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
}

// ======================== ГЛАВНЫЙ ЦИКЛ РЕНДЕРИНГА ========================
function render(timestamp) {
  if (!isPlaying) return;
  
  if (startTime === 0) startTime = timestamp;
  const elapsed = (timestamp - startTime) / 1000;
  
  // Обновление камеры
  camera.shake *= 0.9;
  camera.zoom += (1.0 - camera.zoom) * 0.2;
  
  ctx.save();
  ctx.translate(canvas.width/2, canvas.height/2);
  ctx.scale(camera.zoom, camera.zoom);
  ctx.translate(-canvas.width/2, -canvas.height/2);
  ctx.translate(
    (Math.random() - 0.5) * camera.shake,
    (Math.random() - 0.5) * camera.shake
  );
  
  // Фон
  ctx.fillStyle = '#08090c';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Обновление шага таймлайна
  while (currentStepIndex < steps.length - 1 && elapsed >= steps[currentStepIndex + 1].time) {
    currentStepIndex++;
    const trigger = steps[currentStepIndex].trigger;
    if (trigger === 'IMPACT') triggerImpact();
    if (trigger === 'GLITCH') triggerGlitch();
    if (trigger === 'FLASH') triggerFlash('#ffffff');
  }
  
  // Текущий текст
  if (currentStepIndex < steps.length) {
    const step = steps[currentStepIndex];
    ctx.font = 'bold 42px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    
    if (glitchIntensity > 0.01) {
      drawGlitchText(step.text, canvas.width/2, canvas.height/2, 5 * glitchIntensity);
      glitchIntensity *= 0.9;
    } else {
      ctx.fillStyle = '#00ff66';
      ctx.fillText(step.text, canvas.width/2, canvas.height/2);
    }
  }
  
  // Вспышка
  if (flashAlpha > 0.01) {
    ctx.fillStyle = `rgba(255, 255, 255, ${flashAlpha})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    flashAlpha *= 0.8;
  }
  
  // Частицы
  const dt = 1/60;
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update(dt);
    particles[i].draw(ctx);
    if (particles[i].life <= 0) particles.splice(i, 1);
  }
  
  ctx.restore();
  
  if (elapsed < totalDuration) {
    animationFrameId = requestAnimationFrame(render);
  } else {
    // Конец
    isPlaying = false;
    stopRecording();
    if (animationFrameId) cancelAnimationFrame(animationFrameId);
    resetState();
    setStatus('Готово. Можешь скачать видео.');
  }
}

function resetState() {
  currentStepIndex = 0;
  startTime = 0;
  camera = { x: 0, y: 0, zoom: 1, shake: 0 };
  glitchIntensity = 0;
  flashAlpha = 0;
  particles = [];
}

// ======================== ЗАГРУЗКА СЕРИИ ========================
function processPlaceholders(text) {
  return text.replace(/\{\{USER_NAME\}\}/g, window.userTelegramNick);
}

window.loadAndPlaySeries = function(seriesData) {
  if (isPlaying) {
    // Останавливаем текущий рендер
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      mediaRecorder.stop();
    }
    if (animationFrameId) cancelAnimationFrame(animationFrameId);
    isPlaying = false;
  }
  
  currentSeries = seriesData;
  // Копируем шаги и заменяем плейсхолдеры
  steps = seriesData.timeline.map(step => ({
    ...step,
    text: processPlaceholders(step.text)
  }));
  totalDuration = seriesData.duration || 15;
  resetState();
  
  setStatus(`Запуск серии ${seriesData.id}...`);
  
  // Начать запись и воспроизведение
  startRecording().then(() => {
    isPlaying = true;
    animationFrameId = requestAnimationFrame(render);
  });
};

// ======================== ИНТЕРАКТИВ: ТАПЫ ПО ХОЛСТУ ========================
canvas.addEventListener('pointerdown', (e) => {
  if (!isPlaying) return;
  // Запускаем глитч
  triggerGlitch();
  // Добавляем частицы в месте касания
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;
  spawnParticles(x, y, 15, '#00ff66');
});

// ======================== ИНТЕРФЕЙС ========================
function setStatus(text) {
  document.getElementById('status').innerText = text;
}

// Кнопки выбора серии (заглушки, пока нет JSON-файлов)
document.querySelectorAll('.series-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const seriesId = parseInt(btn.dataset.series, 10);
    setStatus(`Серия ${seriesId} ещё не загружена. Добавьте JSON в код.`);
  });
});

// Инициализация Telegram Web App (цвета)
if (window.Telegram?.WebApp) {
  window.Telegram.WebApp.setHeaderColor('#000000');
  window.Telegram.WebApp.setBackgroundColor('#000000');
}
</script>
<script src="data.js"></script>
</body>
</html>
