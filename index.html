<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Omniverse Terminal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #05070a;
            color: #00f0ff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Эффект старого ЭЛТ-монитора */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .terminal {
            display: flex;
            flex-direction: column;
            height: 90vh;
            justify-content: flex-start;
        }

        .header {
            text-shadow: 0 0 10px #00f0ff;
            font-weight: bold;
            margin-bottom: 20px;
            border-bottom: 1px dashed #00f0ff;
            padding-bottom: 10px;
        }

        .logs {
            font-size: 14px;
            line-height: 1.5;
            flex-grow: 1;
        }

        .log-line {
            opacity: 0;
            margin-bottom: 8px;
            animation: fadeIn 0.3s forwards;
        }

        .accent {
            color: #ff0055;
            text-shadow: 0 0 8px #ff0055;
        }

        .success {
            color: #00ff66;
            text-shadow: 0 0 8px #00ff66;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background-color: #00f0ff;
            animation: blink 1s infinite;
            vertical-align: middle;
            box-shadow: 0 0 8px #00f0ff;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="terminal">
        <div class="header">
            === OMNIVERSE CORE TERMINAL v0.4.2 ===<br>
            SECURITY LEVEL: CLASSIFIED
        </div>
        <div class="logs" id="logContainer">
            </div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Расширяет окно на максимум

        // Настройка цветов темы TG (опционально)
        tg.setHeaderColor('#05070a');

        const logs = [
            { text: "[ INFO ] Инициализация протокола связи с Omniverse...", delay: 200 },
            { text: "[ OK ] Скрипт Telegram WebApp успешно внедрен.", delay: 600, type: "success" },
            { text: "[ WARN ] Локальный вычислительный кластер не отвечает.", delay: 1200, type: "accent" },
            { text: "[ INFO ] Переключение на резервный статический узел хранения...", delay: 1700 },
            { text: "[ OK ] Соединение со статическим зеркалом GitHub установлено.", delay: 2300, type: "success" },
            { text: "[ INFO ] Синхронизация игровых механик (Minecraft-core)...", delay: 3000 },
            { text: "[ STATUS ] РЕЖИМ ОЖИДАНИЯ: Развертывание бэкенда.", delay: 3800 },
            { text: ">> Идет настройка GPU-серверов. Агенты компилируют окружение...", delay: 4500 },
            { text: ">> Пожалуйста, вернитесь позже. Сеть будет активна в ближайшее время.", delay: 5200 },
            { text: "[ READY ] Терминал переведен в режим мониторинга. Ожидание хоста... <span class='cursor'></span>", delay: 6000 }
        ];

        const container = document.getElementById('logContainer');

        logs.forEach(log => {
            setTimeout(() => {
                const line = document.createElement('div');
                line.className = 'log-line';
                if (log.type) line.classList.add(log.type);
                line.innerHTML = log.text;
                container.appendChild(line);
            }, log.delay);
        });
    </script>
</body>
</html>
