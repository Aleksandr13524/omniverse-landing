function voxel(w, h, d, color, emissive=0x000000, emissInt=0) {
  return new THREE.Mesh(
    new THREE.BoxGeometry(w,h,d),
    new THREE.MeshStandardMaterial({
      color, roughness:0.6, metalness:0.1,
      emissive, emissiveIntensity: emissInt
    })
  );
}
function add(grp, mesh, x, y, z) {
  mesh.position.set(x,y,z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  grp.add(mesh);
  return mesh;
}

function buildCharacter(def) {
  const G = new THREE.Group();
  const {
    skin, shirt, pants, boots, accent, glowCol,
    headW=0.72, headH=0.72, headD=0.72, bodyW=0.72, bodyH=1.0, bodyD=0.44,
    shoulderExtra=0, armW=0.28, armH=0.9, armD=0.28, legW=0.3, legH=0.9, legD=0.3,
    hasHelmet=false, helmetCol=0x333333, hasVisor=false, visorCol=0x4488FF,
    hasHair=false, hairCol=0x111111, hasBeard=false, hasBackpack=false, backpackCol=0x223322,
    hasWeapon=false, weaponDef=null, hasArmor=false, armorCol=0x334433, hasCape=false, capeCol=0x220011,
    hasHat=false, hatCol=0x111111, hasMushroom=false, hasEars=false, earCol=0x553300
  } = def;

  const BY = legH + bodyH/2;
  const HY = BY + bodyH/2 + headH/2;

  G.legLGroup = new THREE.Group(); G.legLGroup.position.set(-(legW/2+0.02), legH, 0); G.add(G.legLGroup);
  G.legRGroup = new THREE.Group(); G.legRGroup.position.set((legW/2+0.02), legH, 0); G.add(G.legRGroup);
  const m_legL = voxel(legW, legH, legD, pants); m_legL.position.y = -legH/2; G.legLGroup.add(m_legL);
  const m_legR = voxel(legW, legH, legD, pants); m_legR.position.y = -legH/2; G.legRGroup.add(m_legR);
  const bootL = voxel(legW+0.06, 0.2, legD+0.1, boots); add(G.legLGroup, bootL, 0, -legH+0.1, 0.05);
  const bootR = voxel(legW+0.06, 0.2, legD+0.1, boots); add(G.legRGroup, bootR, 0, -legH+0.1, 0.05);

  const body = voxel(bodyW, bodyH, bodyD, shirt); add(G, body, 0, BY, 0);
  if(hasArmor) {
    const sL = voxel(0.18+shoulderExtra, 0.35, bodyD+0.1, armorCol, glowCol, 0.1); add(G, sL, -(bodyW/2+0.09+shoulderExtra/2), BY+0.25, 0);
    const sR = voxel(0.18+shoulderExtra, 0.35, bodyD+0.1, armorCol, glowCol, 0.1); add(G, sR, (bodyW/2+0.09+shoulderExtra/2), BY+0.25, 0);
  }
  if(hasCape) { const cape = voxel(bodyW-0.1, bodyH*0.9, 0.08, capeCol); add(G, cape, 0, BY-0.05, -(bodyD/2+0.05)); }

  G.armLGroup = new THREE.Group(); G.armLGroup.position.set(-(bodyW/2+armW/2+0.04), BY+0.3, 0); G.add(G.armLGroup);
  G.armRGroup = new THREE.Group(); G.armRGroup.position.set((bodyW/2+armW/2+0.04), BY+0.3, 0); G.add(G.armRGroup);
  const m_armL = voxel(armW, armH, armD, shirt); m_armL.position.y = -armH/2; G.armLGroup.add(m_armL);
  const m_armR = voxel(armW, armH, armD, shirt); m_armR.position.y = -armH/2; G.armRGroup.add(m_armR);
  const gloveL = voxel(armW+0.06, 0.18, armD+0.06, accent); add(G.armLGroup, gloveL, 0, -armH+0.09, 0);
  const gloveR = voxel(armW+0.06, 0.18, armD+0.06, accent); add(G.armRGroup, gloveR, 0, -armH+0.09, 0);

  const head = voxel(headW, headH, headD, skin); add(G, head, 0, HY, 0);
  const eyeL = voxel(0.12, 0.1, 0.05, 0x001100, glowCol, 0.8); add(G, eyeL, -0.16, HY+0.04, headD/2+0.01);
  const eyeR = voxel(0.12, 0.1, 0.05, 0x001100, glowCol, 0.8); add(G, eyeR, 0.16, HY+0.04, headD/2+0.01);
  const mouth = voxel(0.22, 0.07, 0.04, 0x001100); add(G, mouth, 0, HY-0.18, headD/2+0.01);

  if(hasHair) {
    const hair = voxel(headW+0.04, 0.2, headD+0.04, hairCol); add(G, hair, 0, HY+headH/2+0.06, 0);
    const bang = voxel(headW, 0.18, 0.12, hairCol); add(G, bang, 0, HY+headH/2-0.02, headD/2+0.02);
  }
  if(hasBeard) { const beard = voxel(headW-0.1, 0.22, 0.1, hairCol||0x332200); add(G, beard, 0, HY-headH/2+0.02, headD/2+0.02); }
  if(hasEars) {
    const eL = voxel(0.1, 0.28, 0.12, earCol); add(G, eL, -(headW/2+0.06), HY+0.06, 0);
    const eR = voxel(0.1, 0.28, 0.12, earCol); add(G, eR, (headW/2+0.06), HY+0.06, 0);
  }
  if(hasHelmet) {
    const helm = voxel(headW+0.1, headH*0.65, headD+0.1, helmetCol); add(G, helm, 0, HY+0.05, 0);
    if(hasVisor) { const visor = voxel(headW-0.1, 0.18, 0.06, visorCol, visorCol, 1.2); add(G, visor, 0, HY+0.06, headD/2+0.08); }
  }
  if(hasHat) {
    const brim = voxel(headW+0.3, 0.08, headD+0.3, hatCol); add(G, brim, 0, HY+headH/2+0.04, 0);
    const top2 = voxel(headW-0.1, 0.45, headD-0.1, hatCol); add(G, top2, 0, HY+headH/2+0.04+0.27, 0);
  }
  if(hasBackpack) {
    const bp = voxel(0.5, 0.7, 0.28, backpackCol); add(G, bp, 0, BY+0.1, -(bodyD/2+0.18));
    const bpTop = voxel(0.3, 0.2, 0.2, backpackCol); add(G, bpTop, 0, BY+0.52, -(bodyD/2+0.18));
  }
  if(hasMushroom) {
    const stem = voxel(0.14, 0.25, 0.14, 0x88AA88); add(G, stem, 0.18, HY+headH/2+0.23, 0);
    const cap = voxel(0.38, 0.18, 0.38, accent, accent, 0.3); add(G, cap, 0.18, HY+headH/2+0.42, 0);
  }

  if(hasWeapon && weaponDef) {
    const w = weaponDef;
    const wGrp = new THREE.Group();
    if(w.type==='sword') {
      const blade = voxel(0.1, 0.9, 0.08, w.col||0x88AAAA, w.col||0x88AAAA, 0.2); wGrp.add(blade); blade.position.y = 0.5;
      const guard = voxel(0.3, 0.08, 0.1, accent); wGrp.add(guard);
      const hilt  = voxel(0.09, 0.3, 0.09, accent); wGrp.add(hilt); hilt.position.y = -0.18;
      wGrp.position.set(0, -armH, 0.1); wGrp.rotation.x = Math.PI/3;
    }
    if(w.type==='rifle') {
      const stock  = voxel(0.12, 0.14, 0.7, w.col||0x223322); wGrp.add(stock);
      const barrel = voxel(0.08, 0.08, 0.5, 0x334433); wGrp.add(barrel); barrel.position.set(0, 0.1, 0.2);
      const grip   = voxel(0.1, 0.3, 0.12, w.col||0x223322); wGrp.add(grip); grip.position.set(0,-0.16,-0.1);
      wGrp.position.set(0, -armH, 0.2); wGrp.rotation.x = Math.PI/2;
    }
    if(w.type==='staff') {
      const staff = voxel(0.08, 1.5, 0.08, w.col||0x442200); wGrp.add(staff); staff.position.y=0.4;
      const orb   = voxel(0.26, 0.26, 0.26, accent, accent, 1.0); wGrp.add(orb); orb.position.y=1.2;
      wGrp.position.set(0, -armH+0.2, 0.1);
    }
    if(w.type==='crowbar') {
      const bar = voxel(0.08, 0.85, 0.08, w.col||0x445544); wGrp.add(bar); bar.position.y=0.3;
      const tip = voxel(0.22, 0.08, 0.08, w.col||0x445544); wGrp.add(tip); tip.position.y=0.78;
      wGrp.position.set(0, -armH, 0.1); wGrp.rotation.x = Math.PI/4;
    }
    if(w.type==='cannon') {
      const barrel = voxel(0.3, 0.3, 0.8, w.col||0x334433); wGrp.add(barrel); barrel.position.z=0.1;
      const base   = voxel(0.44, 0.2, 0.44, 0x223322); wGrp.add(base);
      wGrp.position.set(0, -armH, 0); wGrp.rotation.x = Math.PI/2;
    }
    G.armRGroup.add(wGrp);
  }

  const badge = voxel(0.22, 0.16, 0.06, accent, accent, 0.8); add(G, badge, 0, BY+0.15, bodyD/2+0.02);

  G.circleGeo = new THREE.RingGeometry(0.5, 0.65, 16);
  G.circleMat = new THREE.MeshBasicMaterial({ color:accent, side:THREE.DoubleSide, transparent:true, opacity:0.4 });
  const pCircle = new THREE.Mesh(G.circleGeo, G.circleMat);
  pCircle.rotation.x = -Math.PI/2;
  pCircle.position.y = 0.02;
  G.add(pCircle);

  G.scale.setScalar(0.85);
  G._def = def;
  return G;
}

// Простой шум Перлина для генерации высот (inline реализация)
class Perlin {
  constructor() {
    this.p = new Uint8Array(512);
    const perm = new Uint8Array(256);
    for (let i = 0; i < 256; i++) perm[i] = i;
    // shuffle
    for (let i = 255; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [perm[i], perm[j]] = [perm[j], perm[i]];
    }
    for (let i = 0; i < 512; i++) this.p[i] = perm[i & 255];
  }
  fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
  lerp(a, b, t) { return a + t * (b - a); }
  grad(hash, x, y, z) {
    const h = hash & 15;
    const u = h < 8 ? x : y;
    const v = h < 4 ? y : (h === 12 || h === 14 ? x : z);
    return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
  }
  noise(x, y, z) {
    const X = Math.floor(x) & 255, Y = Math.floor(y) & 255, Z = Math.floor(z) & 255;
    x -= Math.floor(x); y -= Math.floor(y); z -= Math.floor(z);
    const u = this.fade(x), v = this.fade(y), w = this.fade(z);
    const p = this.p;
    const A = p[X] + Y, AA = p[A] + Z, AB = p[A + 1] + Z;
    const B = p[X + 1] + Y, BA = p[B] + Z, BB = p[B + 1] + Z;
    return this.lerp(
      this.lerp(this.lerp(this.grad(p[AA], x, y, z), this.grad(p[BA], x-1, y, z), u),
                this.lerp(this.grad(p[AB], x, y-1, z), this.grad(p[BB], x-1, y-1, z), u), v),
      this.lerp(this.lerp(this.grad(p[AA+1], x, y, z-1), this.grad(p[BA+1], x-1, y, z-1), u),
                this.lerp(this.grad(p[AB+1], x, y-1, z-1), this.grad(p[BB+1], x-1, y-1, z-1), u), v), w);
  }
}

// Функция генерации чанка (размер 20x20) с центром в (cx, cz)
function generateChunk(cx, cz) {
  const chunkSize = 20;
  const step = 0.3;
  const half = chunkSize/2;
  // Создаём группу для чанка
  const chunkGroup = new THREE.Group();
  chunkGroup.position.set(cx, 0, cz);

  // Материалы
  const groundMat = new THREE.MeshStandardMaterial({ color:0x0a1a0a, roughness:0.9, metalness:0.0 });
  const treeMat = new THREE.MeshStandardMaterial({ color:0x2a5a2a, roughness:0.7 });
  const fenceMat = new THREE.MeshStandardMaterial({ color:0x1a2a1a, roughness:0.8 });
  const mushroomMat = new THREE.MeshStandardMaterial({ color:0x00ff41, emissive:0x00ff41, emissiveIntensity:0.3 });

  // Генерируем карту высот
  const heightMap = [];
  for (let x = -half; x <= half; x += step) {
    for (let z = -half; z <= half; z += step) {
      const wx = cx + x, wz = cz + z;
      let h = perlin.noise(wx * 0.08, wz * 0.08, 0) * 0.8;
      // Второй слой для создания островов (перепады)
      h += perlin.noise(wx * 0.15, wz * 0.15, 1) * 0.3;
      // Порог для суши: h > -0.1
      const isLand = h > -0.1;
      heightMap.push({x, z, h, isLand});
    }
  }

  // Рисуем землю (просто большой плоский прямоугольник с текстурой? — используем сетку примитивов)
  // Для упрощения используем один меш земли на чанк, но он не будет учитывать перепады.
  // Чтобы сэкономить, просто создадим плоскость с подложкой травы.
  const ground = new THREE.Mesh(new THREE.PlaneGeometry(chunkSize, chunkSize), groundMat);
  ground.rotation.x = -Math.PI/2;
  ground.position.set(0, -0.05, 0);
  ground.receiveShadow = true;
  chunkGroup.add(ground);

  // Добавляем острова как отдельные плитки (повышенные участки)
  // Для простоты используем кубы с разной высотой
  const tileSize = 1.2;
  for (let x = -half; x <= half; x += tileSize) {
    for (let z = -half; z <= half; z += tileSize) {
      const wx = cx + x, wz = cz + z;
      const h = perlin.noise(wx * 0.08, wz * 0.08, 0) * 0.8 + perlin.noise(wx * 0.15, wz * 0.15, 1) * 0.3;
      if (h > -0.05) {
        const height = Math.max(0.1, h * 0.8 + 0.2);
        const tile = new THREE.Mesh(
          new THREE.BoxGeometry(tileSize*0.9, height, tileSize*0.9),
          new THREE.MeshStandardMaterial({ color: 0x1a3a1a, roughness:0.8 })
        );
        tile.position.set(x, height/2 - 0.05, z);
        tile.castShadow = true;
        tile.receiveShadow = true;
        chunkGroup.add(tile);

        // Размещаем деревья на островах (вероятность)
        if (Math.random() < 0.12 && height > 0.4) {
          const tree = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.25, 0.5 + Math.random()*0.3, 4), treeMat);
          tree.position.set(x + (Math.random()-0.5)*0.6, height + 0.25, z + (Math.random()-0.5)*0.6);
          tree.castShadow = true;
          chunkGroup.add(tree);
          worldObjects.trees.push(tree);
        }
        // Размещаем заборы (на границах островов) — упрощённо: просто линии из кубов
        if (Math.random() < 0.05 && height > 0.3) {
          const fence = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.3, 0.08), fenceMat);
          fence.position.set(x + (Math.random()-0.5)*0.8, height + 0.15, z + (Math.random()-0.5)*0.8);
          fence.castShadow = true;
          chunkGroup.add(fence);
          worldObjects.fences.push(fence);
        }
        // Размещаем грибы (мицелий) — цель сбора
        if (Math.random() < 0.04 && height > 0.2) {
          const mush = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 0.4, 6), mushroomMat);
          mush.position.set(x + (Math.random()-0.5)*0.5, height + 0.2, z + (Math.random()-0.5)*0.5);
          mush.castShadow = true;
          chunkGroup.add(mush);
          worldObjects.mushrooms.push({ mesh: mush, collected: false });
        }
      }
    }
  }

  // Добавляем врагов (крипов) — они появляются редко и будут преследовать
  if (Math.random() < 0.03) {
    const enemyMat = new THREE.MeshStandardMaterial({ color: 0xff3333, emissive:0xff0000, emissiveIntensity:0.2 });
    const enemy = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.8), enemyMat);
    const ex = (Math.random()-0.5)*chunkSize*0.8;
    const ez = (Math.random()-0.5)*chunkSize*0.8;
    const h = perlin.noise((cx+ex)*0.08, (cz+ez)*0.08, 0)*0.8 + perlin.noise((cx+ex)*0.15, (cz+ez)*0.15, 1)*0.3;
    const yPos = Math.max(0.1, h*0.8+0.2) + 0.6;
    enemy.position.set(ex, yPos, ez);
    enemy.castShadow = true;
    chunkGroup.add(enemy);
    worldObjects.enemies.push(enemy);
  }

  scene.add(chunkGroup);
  return chunkGroup;
}

// Управление чанками (простая система)
let chunkMap = {};
let loadedChunks = [];

function getChunkKey(cx, cz) {
  return `${Math.round(cx/20)},${Math.round(cz/20)}`;
}

function updateChunks(playerPos) {
  const cx = Math.round(playerPos.x / 20) * 20;
  const cz = Math.round(playerPos.z / 20) * 20;
  const radius = 2; // кол-во чанков в радиусе
  const needed = new Set();
  for (let dx = -radius; dx <= radius; dx++) {
    for (let dz = -radius; dz <= radius; dz++) {
      const key = getChunkKey(cx + dx*20, cz + dz*20);
      needed.add(key);
      if (!chunkMap[key]) {
        const group = generateChunk(cx + dx*20, cz + dz*20);
        chunkMap[key] = group;
        loadedChunks.push(group);
      }
    }
  }
  // Удаляем чанки, которые далеко
  for (let i = loadedChunks.length - 1; i >= 0; i--) {
    const group = loadedChunks[i];
    const dist = Math.sqrt(group.position.x*group.position.x + group.position.z*group.position.z);
    if (dist > 80) {
      scene.remove(group);
      loadedChunks.splice(i, 1);
      // удаляем из chunkMap (не критично)
    }
  }
}

// ═══════════════════════════════════════════════════
//  ИГРОВОЕ СОСТОЯНИЕ
// ═══════════════════════════════════════════════════
let playerGroup = null;
let currentIdx = 0;
let charGroups = {};

// Игрок
const player = {
  x: 0, y: 0, z: 0,
  vx: 0, vy: 0, vz: 0,
  onGround: false,
  speed: 4,
  jumpPower: 5,
  gravity: -12
};

// Управление
let moveLeft = false, moveRight = false;
let jumpRequested = false;

// Сбор
let mushroomsCollected = 0;
const maxMushrooms = 5;
let gameOver = false;
let enemy = null; // ссылка на врага

// ═══════════════════════════════════════════════════
//  СБОРКА ПЕРСОНАЖЕЙ И ИНИЦИАЛИЗАЦИЯ
// ═══════════════════════════════════════════════════
CHARS.forEach(def => {
  const G = buildCharacter(def);
  G.visible = false;
  scene.add(G);
  charGroups[def.id] = G;
});

function showChar(idx) {
  if(playerGroup) playerGroup.visible = false;
  currentIdx = idx;
  const def = CHARS[idx];
  playerGroup = charGroups[def.id];
  playerGroup.visible = true;
  playerGroup.position.set(player.x, player.y, player.z);
  playerGroup.rotation.set(0,0,0);

  document.getElementById('char-name').textContent = def.name;
  document.getElementById('char-lvl').textContent = `${def.lvl} · ${def.lives} · ${def.league}-ЛИГА`;
  document.querySelectorAll('.char-btn').forEach((b,i)=>{
    b.classList.toggle('active', i===idx);
  });
  keyLight.color.setHex(def.glowCol);
  rimLight.color.setHex(def.glowCol);
}

// UI
const ui = document.getElementById('ui');
const leagueColors = { 'SOULS':'#00FF41', 'PUBG':'#FFAA00', 'ТАНКИ':'#FF4444', 'FREE':'#44FF44', 'FREEMAN':'#FF8800' };
CHARS.forEach((def,i) => {
  const col = leagueColors[def.league]||'#00FF41';
  const btn = document.createElement('div');
  btn.className = 'char-btn';
  btn.style.setProperty('--col', col);
  btn.innerHTML = `
    <div class="btn-dot" style="background:${col};box-shadow:0 0 6px ${col};"></div>
    <div class="btn-name">${def.id==='you'?'ВЫ':def.id.split('_')[0].toUpperCase()}</div>
    <div class="btn-class">${def.league}</div>
  `;
  btn.addEventListener('click', (e)=>{ e.preventDefault(); if(!gameOver) showChar(i); });
  btn.addEventListener('touchend', (e)=>{ e.preventDefault(); if(!gameOver) showChar(i); });
  ui.appendChild(btn);
});
showChar(0);

// ═══════════════════════════════════════════════════
//  УПРАВЛЕНИЕ (свайпы + тап для прыжка)
// ═══════════════════════════════════════════════════
let touchStartX = 0, touchStartY = 0;

canvas.addEventListener('touchstart', (e) => {
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
  // Определяем прыжок, если тап был коротким и без движения
}, {passive: true});

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  if (Math.abs(dx) > 20) {
    if (dx > 0) { moveRight = true; moveLeft = false; }
    else { moveLeft = true; moveRight = false; }
  } else {
    moveLeft = false; moveRight = false;
  }
  // Если палец двигается вверх — прыжок
  if (dy < -30) {
    jumpRequested = true;
  }
}, {passive: false});

canvas.addEventListener('touchend', (e) => {
  moveLeft = false; moveRight = false;
  // Если движение было небольшим, считаем прыжком
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  if (Math.abs(dx) < 30 && dy > -30) {
    jumpRequested = true;
  }
}, {passive: true});

// Мышь/клавиатура для ПК
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft' || e.key === 'a') { moveLeft = true; moveRight = false; }
  if (e.key === 'ArrowRight' || e.key === 'd') { moveRight = true; moveLeft = false; }
  if (e.key === ' ' || e.key === 'w' || e.key === 'ArrowUp') { jumpRequested = true; e.preventDefault(); }
});
document.addEventListener('keyup', (e) => {
  if (e.key === 'ArrowLeft' || e.key === 'a') moveLeft = false;
  if (e.key === 'ArrowRight' || e.key === 'd') moveRight = false;
});

// ═══════════════════════════════════════════════════
//  ИГРОВОЙ ЦИКЛ
// ═══════════════════════════════════════════════════
const clock = new THREE.Clock();

function update(dt) {
  if (gameOver) return;

  // Управление
  let accel = 0;
  if (moveLeft) accel = -1;
  if (moveRight) accel = 1;
  player.vx += accel * 6 * dt;
  player.vx *= 0.9; // трение
  if (Math.abs(player.vx) > 4) player.vx = Math.sign(player.vx) * 4;
  player.x += player.vx * dt;

  // Гравитация
  player.vy += player.gravity * dt;
  player.y += player.vy * dt;

  // Прыжок
  if (jumpRequested && player.onGround) {
    player.vy = player.jumpPower;
    player.onGround = false;
  }
  jumpRequested = false;

  // Проверка земли (коллизия с островами — упрощённо, считаем что земля на y=0)
  // Здесь нужно проверять высоту ландшафта, но для простоты используем плоскую поверхность с небольшими возвышениями.
  // Вместо сложной физики просто ограничим y>=0.
  if (player.y < 0) {
    player.y = 0;
    player.vy = 0;
    player.onGround = true;
  }

  // Автоматическое движение вперёд (по оси Z) — как в раннере
  player.z += 4 * dt;

  // Ограничение по X (чтобы не уйти далеко)
  if (player.x > 8) player.x = 8;
  if (player.x < -8) player.x = -8;

  // Обновление чанков
  updateChunks(player);

  // Проверка сбора грибов
  for (let i = worldObjects.mushrooms.length - 1; i >= 0; i--) {
    const m = worldObjects.mushrooms[i];
    if (m.collected) continue;
    const dx = player.x - (m.mesh.position.x + m.mesh.parent.position.x); // parent это chunkGroup
    const dz = player.z - (m.mesh.position.z + m.mesh.parent.position.z);
    if (Math.sqrt(dx*dx + dz*dz) < 1.2) {
      m.collected = true;
      scene.remove(m.mesh); // удаляем из группы? проще скрыть
      m.mesh.visible = false;
      mushroomsCollected++;
      document.getElementById('cassette-hud').textContent = `🍄 ${mushroomsCollected}/${maxMushrooms}`;
      if (mushroomsCollected >= maxMushrooms) {
        gameOver = true;
        showOverlay(true);
      }
    }
  }

  // Враг (преследователь) — двигается к игроку
  if (worldObjects.enemies.length > 0) {
    const enemy = worldObjects.enemies[0];
    const dx = player.x - (enemy.position.x + enemy.parent.position.x);
    const dz = player.z - (enemy.position.z + enemy.parent.position.z);
    const dist = Math.sqrt(dx*dx + dz*dz);
    if (dist > 1.5) {
      const speed = 1.2;
      enemy.position.x += (dx / dist) * speed * dt;
      enemy.position.z += (dz / dist) * speed * dt;
    }
    // Проверка столкновения с игроком
    if (dist < 1.0) {
      gameOver = true;
      showOverlay(false);
    }
  }

  // Обновление позиции игрока
  if (playerGroup) {
    playerGroup.position.set(player.x, player.y, player.z);
    playerGroup.rotation.z = -player.vx * 0.05;
    // Анимация бега
    const runCycle = Math.sin(performance.now() / 150);
    playerGroup.legLGroup.rotation.x = runCycle * 0.4;
    playerGroup.legRGroup.rotation.x = -runCycle * 0.4;
    playerGroup.armLGroup.rotation.x = -runCycle * 0.4;
    playerGroup.armRGroup.rotation.x = runCycle * 0.4;
    if (!player.onGround) {
      // анимация прыжка
      playerGroup.legLGroup.rotation.x = -0.3;
      playerGroup.legRGroup.rotation.x = -0.3;
    }
    // Подсветка под ногами
    playerGroup.circleMat.opacity = 0.2 + Math.sin(performance.now()/300)*0.1;
  }

  // Камера следует за игроком
  camera.position.x += (player.x - camera.position.x) * 2 * dt;
  camera.position.z += (player.z - 8 - camera.position.z) * 2 * dt;
  camera.lookAt(player.x, player.y+1, player.z-4);

  // Частицы двигаются
  const pos = particles.geometry.attributes.position;
  for (let i=0; i<pCount; i++) {
    pos.array[i*3+2] += 2 * dt;
    if (pos.array[i*3+2] > 10) {
      pos.array[i*3+2] = -50;
      pos.array[i*3] = (Math.random()-0.5)*40;
      pos.array[i*3+1] = Math.random()*6 + 1;
    }
  }
  pos.needsUpdate = true;
}

function showOverlay(isWin) {
  const overlay = document.getElementById('game-overlay');
  const title = document.getElementById('overlay-header');
  const desc = document.getElementById('overlay-desc');
  if (isWin) {
    title.textContent = "СИНХРОНИЗАЦИЯ СЕТИ";
    desc.textContent = `Архитектура распределенного Мицелия развернута успешно! Грибы собраны. Персонаж Лиги ${playerGroup._def.league} подключен к ядру OMNIVERSE.`;
  } else {
    title.textContent = "ПОТЕРЯ СИГНАЛА";
    desc.textContent = "Вас настиг крип. Попробуйте снова, уклоняйтесь и собирайте грибы.";
  }
  overlay.style.display = 'flex';
}

function resetGame() {
  document.getElementById('game-overlay').style.display = 'none';
  // Сброс состояния
  player.x = 0; player.y = 0; player.z = 0;
  player.vx = 0; player.vy = 0;
  player.onGround = false;
  mushroomsCollected = 0;
  document.getElementById('cassette-hud').textContent = `🍄 0/${maxMushrooms}`;
  gameOver = false;
  // Очистка мира
  for (let key in chunkMap) {
    scene.remove(chunkMap[key]);
  }
  chunkMap = {};
  loadedChunks = [];
  worldObjects = { trees: [], fences: [], mushrooms: [], enemies: [] };
  // Генерация начального чанка
  updateChunks(player);
}

// ═══════════════════════════════════════════════════
//  ЗАПУСК
// ═══════════════════════════════════════════════════
// Генерируем начальный мир
updateChunks(player);

// Анимационный цикл
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  update(dt);
  renderer.render(scene, camera);
}
animate();

// Resize
addEventListener('resize',()=>{
  camera.aspect=W()/H();
  camera.updateProjectionMatrix();
  renderer.setSize(W(),H());
});

</script>
